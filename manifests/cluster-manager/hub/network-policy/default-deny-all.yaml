apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .ClusterManagerNamespace }}
  labels:
    {{ if gt (len .Labels) 0 }}
    {{ range $key, $value := .Labels }}
    "{{ $key }}": "{{ $value }}"
    {{ end }}
    {{ end }}
spec:
  podSelector:
    matchLabels:
      open-cluster-management.io/created-by-clustermanager: {{ .ClusterManagerName }}
  policyTypes:
  - Ingress
  - Egress
