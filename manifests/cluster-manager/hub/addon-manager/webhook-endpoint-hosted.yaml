kind: Endpoints
apiVersion: v1
metadata:
  name: cluster-manager-addon-webhook
  namespace: {{ .ClusterManagerNamespace }}
  labels:
    {{ if gt (len .Labels) 0 }}
    {{ range $key, $value := .Labels }}
    "{{ $key }}": "{{ $value }}"
    {{ end }}
    {{ end }}
subsets:
  - addresses:
      - ip: {{.AddonWebhook.HostedAddress}}
    ports:
      - port: {{.AddonWebhook.HostedPort}}
        name: tls
