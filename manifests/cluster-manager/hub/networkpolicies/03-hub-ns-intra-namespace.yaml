# Intra-namespace pod-to-pod communication.
# Required because kube-apiserver calls webhooks via ClusterIP Services
# within open-cluster-management-hub namespace.
# Also covers placement-controller debug server access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: {{ .ClusterManagerNamespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
