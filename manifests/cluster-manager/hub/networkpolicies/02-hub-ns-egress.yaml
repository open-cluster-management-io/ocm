# Combined egress policy for all hub controller and webhook pods.
# Rule 1: DNS resolution (CoreDNS port 53, openshift-dns port 5353)
# Rule 2: kube-apiserver egress (ports 443, 6443)
# Both rules apply to all pods (podSelector: {}) and are always needed together.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: {{ .ClusterManagerNamespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
