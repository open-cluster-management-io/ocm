# Kubelet health/readiness probes for all hub controller and webhook pods.
# Kubelet originates from node IP (not a pod), so ipBlock is required.
# One ipBlock entry per hub node — resolved at reconcile time from Node objects.
# Skipped when NodeCIDRs is empty (node list unavailable at reconcile time).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probe-ingress
  namespace: {{ .ClusterManagerNamespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
        - port: 8443
          protocol: TCP
      from:
{{- range .NodeCIDRs }}
        - ipBlock:
            cidr: {{ . }}
{{- end }}
