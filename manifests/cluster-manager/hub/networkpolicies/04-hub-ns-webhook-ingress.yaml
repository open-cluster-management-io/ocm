# Combined webhook ingress policy for registration, work and addon webhooks.
# All three webhooks are called by kube-apiserver from the same source namespace
# on the same port — a single policy with matchExpressions covers all three.
# Only applied when APIServerNamespace is set in ClusterManagerSpec.NetworkPolicyConfiguration.
# OCM does not detect the platform — the operator supplies the namespace explicitly.
# Common values: "kube-system" (vanilla K8s), "openshift-kube-apiserver" (OpenShift).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: {{ .ClusterManagerNamespace }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - "{{ .ClusterManagerName }}-registration-webhook"
          - "{{ .ClusterManagerName }}-work-webhook"
          - "{{ .ClusterManagerName }}-addon-webhook"
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .RegistrationWebhook.Port }}
          protocol: TCP
        - port: {{ .WorkWebhook.Port }}
          protocol: TCP
        - port: {{ .AddonWebhook.Port }}
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .APIServerNamespace }}
