{{if .RegistrationWebhook.HostedIsIPFormat}}
kind: Service
apiVersion: v1
metadata:
  name: cluster-manager-registration-webhook
  namespace: {{ .ClusterManagerNamespace }}
  labels:
    {{ if gt (len .Labels) 0 }}
    {{ range $key, $value := .Labels }}
    "{{ $key }}": "{{ $value }}"
    {{ end }}
    {{ end }}
spec:
  type: ClusterIP
  ports:
  - protocol: TCP
    port: {{.RegistrationWebhook.HostedPort}}
    targetPort: {{.RegistrationWebhook.HostedPort}}
    name: tls
{{else}}
apiVersion: v1
kind: Service
metadata:
  name: cluster-manager-registration-webhook
  namespace: {{ .ClusterManagerNamespace }}
spec:
  type: ExternalName
  externalName: {{.RegistrationWebhook.HostedAddress}}
{{end}}
